<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Epistudy - Autonomous AI Learning Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { 50:'#f0f4ff',100:'#e0e9ff',200:'#c7d6fe',300:'#a4b8fc',400:'#8193f8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            surface: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',700:'#334155',800:'#1e293b',900:'#0f172a',950:'#020617' }
          }
        }
      }
    };
  </script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    .animate-slideIn { animation: slideIn 0.3s ease-out forwards; }
    .shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(99, 102, 241, 0.1); }
    .glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.15); }
    .score-ring { transition: stroke-dashoffset 1s ease-out; }
    .mobile-menu-open { transform: translateX(0); }
    @media (max-width: 768px) { .sidebar-mobile { transform: translateX(-100%); transition: transform 0.3s ease; } .sidebar-mobile.mobile-menu-open { transform: translateX(0); } }
  </style>
</head>
<body class="bg-surface-950 text-white font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

    // ── API Service ──
    const api = {
      createPlan: (topic, level) => fetch('/api/plan', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({topic,level}) }).then(r=>r.json()),
      getExercise: (sessionId) => fetch('/api/exercise', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sessionId}) }).then(r=>r.json()),
      evaluate: (sessionId, answer) => fetch('/api/evaluate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sessionId,answer}) }).then(r=>r.json()),
      coach: (sessionId) => fetch('/api/coach', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sessionId}) }).then(r=>r.json()),
      getSession: (sessionId) => fetch(`/api/session/${sessionId}`).then(r=>r.json()),
      getHistory: (sessionId) => fetch(`/api/session/${sessionId}/history`).then(r=>r.json()),
    };

    // ── Context ──
    const AppContext = createContext();
    const useApp = () => useContext(AppContext);

    // ── Icons ──
    const Icons = {
      home: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
      book: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>,
      pencil: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>,
      chart: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>,
      brain: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>,
      check: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>,
      arrow: <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>,
      menu: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 6h16M4 12h16M4 18h16"/></svg>,
      close: <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M6 18L18 6M6 6l12 12"/></svg>,
      sparkle: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>,
      target: <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={1.5}/><circle cx="12" cy="12" r="6" strokeWidth={1.5}/><circle cx="12" cy="12" r="2" strokeWidth={1.5}/></svg>,
    };

    // ── Score Ring Component ──
    function ScoreRing({ score, max = 10, size = 80, label }) {
      const pct = score / max;
      const r = (size - 8) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ * (1 - pct);
      const color = pct >= 0.7 ? '#22c55e' : pct >= 0.4 ? '#eab308' : '#ef4444';
      return (
        <div className="relative inline-flex items-center justify-center">
          <svg width={size} height={size} className="-rotate-90">
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth="6"/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" className="score-ring"/>
          </svg>
          <div className="absolute flex flex-col items-center">
            <span className="text-xl font-bold" style={{color}}>{score}</span>
            {label && <span className="text-[10px] text-surface-200">{label}</span>}
          </div>
        </div>
      );
    }

    // ── Loading Skeleton ──
    function Skeleton({ lines = 3 }) {
      return <div className="space-y-3">{Array.from({length:lines}).map((_,i)=><div key={i} className="shimmer h-4 rounded" style={{width:`${70+Math.random()*30}%`}}/>)}</div>;
    }

    // ── Agent Badge ──
    function AgentBadge({ agent, time }) {
      const colors = { 'Learning Planner':'bg-blue-500/20 text-blue-300 border-blue-500/30', 'Exercise Generator':'bg-purple-500/20 text-purple-300 border-purple-500/30', 'Evaluator':'bg-amber-500/20 text-amber-300 border-amber-500/30', 'Pedagogical Coach':'bg-emerald-500/20 text-emerald-300 border-emerald-500/30' };
      return (
        <div className={`inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium border ${colors[agent]||'bg-surface-700 text-surface-200 border-surface-700'}`}>
          <span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" style={{backgroundColor:'currentColor'}}/><span className="relative inline-flex rounded-full h-2 w-2" style={{backgroundColor:'currentColor'}}/></span>
          {agent}{time !== undefined && <span className="opacity-60">({time}ms)</span>}
        </div>
      );
    }

    // ── Dashboard Page ──
    function DashboardPage() {
      const { state, setState } = useApp();
      const [topic, setTopic] = useState('');
      const [level, setLevel] = useState('beginner');
      const [loading, setLoading] = useState(false);

      const handleCreate = async () => {
        if (!topic.trim()) return;
        setLoading(true);
        try {
          const res = await api.createPlan(topic.trim(), level);
          if (res.error) throw new Error(res.error);
          setState(s => ({ ...s, sessionId: res.sessionId, plan: res.plan, page: 'program' }));
        } catch (e) { alert('Error: ' + e.message); }
        setLoading(false);
      };

      const suggestions = ['Machine Learning', 'Web Development', 'Data Structures', 'Financial Analysis', 'Creative Writing', 'Quantum Physics'];

      return (
        <div className="animate-fadeIn max-w-3xl mx-auto">
          <div className="text-center mb-10">
            <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-brand-500/10 border border-brand-500/20 text-brand-300 text-sm mb-6">
              {Icons.sparkle} Autonomous AI Learning Platform
            </div>
            <h1 className="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-white via-brand-200 to-brand-400 bg-clip-text text-transparent">What do you want to learn?</h1>
            <p className="text-surface-200 text-lg max-w-xl mx-auto">Enter a topic and your level. Our AI agents will create a personalized learning journey, generate exercises, evaluate your progress, and adapt in real-time.</p>
          </div>

          <div className="glass rounded-2xl p-6 md:p-8 glow mb-8">
            <div className="mb-6">
              <label className="block text-sm font-medium text-surface-200 mb-2">Topic</label>
              <input type="text" value={topic} onChange={e=>setTopic(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleCreate()} placeholder="e.g., Machine Learning, Python, Calculus..." className="w-full px-4 py-3 bg-surface-900 border border-surface-700 rounded-xl text-white placeholder-surface-200/50 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all"/>
            </div>
            <div className="mb-6">
              <label className="block text-sm font-medium text-surface-200 mb-2">Your Level</label>
              <div className="grid grid-cols-3 gap-3">
                {[['beginner','Beginner','New to the topic'],['intermediate','Intermediate','Some experience'],['advanced','Advanced','Strong foundation']].map(([val,label,desc])=>(
                  <button key={val} onClick={()=>setLevel(val)} className={`p-3 rounded-xl border text-left transition-all ${level===val?'bg-brand-500/10 border-brand-500 text-white':'bg-surface-900 border-surface-700 text-surface-200 hover:border-surface-200'}`}>
                    <div className="font-medium text-sm">{label}</div>
                    <div className="text-xs opacity-60 mt-0.5">{desc}</div>
                  </button>
                ))}
              </div>
            </div>
            <button onClick={handleCreate} disabled={loading||!topic.trim()} className="w-full py-3.5 bg-brand-600 hover:bg-brand-500 disabled:opacity-40 disabled:cursor-not-allowed rounded-xl font-semibold text-white transition-all flex items-center justify-center gap-2">
              {loading ? <><span className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"/>Generating Plan...</> : <>{Icons.sparkle} Create Learning Program</>}
            </button>
          </div>

          <div>
            <p className="text-sm text-surface-200 mb-3">Popular topics</p>
            <div className="flex flex-wrap gap-2">
              {suggestions.map(s=>(
                <button key={s} onClick={()=>setTopic(s)} className="px-3 py-1.5 bg-surface-800 hover:bg-surface-700 border border-surface-700 rounded-lg text-sm text-surface-200 transition-all">{s}</button>
              ))}
            </div>
          </div>

          <div className="mt-12 grid grid-cols-1 md:grid-cols-4 gap-4">
            {[['Learning Planner','Analyzes your topic and creates a structured roadmap','bg-blue-500/10 text-blue-400'],['Exercise Generator','Generates adaptive exercises at your level','bg-purple-500/10 text-purple-400'],['Evaluator','Scores your answers with detailed feedback','bg-amber-500/10 text-amber-400'],['Pedagogical Coach','Autonomously adapts your learning path','bg-emerald-500/10 text-emerald-400']].map(([name,desc,cls])=>(
              <div key={name} className="glass rounded-xl p-4">
                <div className={`w-8 h-8 rounded-lg ${cls} flex items-center justify-center mb-3`}>{Icons.brain}</div>
                <h3 className="font-semibold text-sm mb-1">{name}</h3>
                <p className="text-xs text-surface-200">{desc}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Program Page ──
    function ProgramPage() {
      const { state, setState } = useApp();
      const { plan, sessionId } = state;
      if (!plan) return null;

      const totalChapters = plan.chapters.length;
      const completedCount = state.completedChapters?.length || 0;
      const progress = totalChapters > 0 ? Math.round((completedCount / totalChapters) * 100) : 0;

      return (
        <div className="animate-fadeIn max-w-4xl mx-auto">
          <div className="flex items-center justify-between mb-8">
            <div>
              <h1 className="text-2xl font-bold">{plan.topic}</h1>
              <p className="text-surface-200 text-sm mt-1">{plan.level} level &middot; {plan.estimatedDuration} &middot; {plan.domain} domain</p>
            </div>
            <button onClick={()=>setState(s=>({...s, page:'exercise'}))} className="px-5 py-2.5 bg-brand-600 hover:bg-brand-500 rounded-xl font-medium text-sm transition-all flex items-center gap-2">
              Start Learning {Icons.arrow}
            </button>
          </div>

          <div className="glass rounded-xl p-4 mb-8">
            <div className="flex items-center justify-between mb-2">
              <span className="text-sm font-medium">Progress</span>
              <span className="text-sm text-brand-300">{progress}%</span>
            </div>
            <div className="h-2 bg-surface-800 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-brand-500 to-brand-400 rounded-full transition-all duration-500" style={{width:`${progress}%`}}/>
            </div>
            <div className="flex justify-between mt-2 text-xs text-surface-200">
              <span>{completedCount} of {totalChapters} chapters</span>
              <span>{plan.estimatedDuration}</span>
            </div>
          </div>

          <div className="mb-8">
            <h2 className="text-lg font-semibold mb-4">Learning Objectives</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              {plan.objectives.map((obj,i)=>(
                <div key={i} className="flex items-start gap-3 p-3 bg-surface-800/50 rounded-lg">
                  <div className="w-6 h-6 rounded-full bg-brand-500/20 text-brand-300 flex items-center justify-center text-xs font-bold flex-shrink-0 mt-0.5">{i+1}</div>
                  <span className="text-sm text-surface-200">{obj}</span>
                </div>
              ))}
            </div>
          </div>

          <h2 className="text-lg font-semibold mb-4">Learning Roadmap</h2>
          <div className="space-y-3">
            {plan.chapters.map((ch, i) => {
              const isCompleted = state.completedChapters?.includes(i);
              const isCurrent = i === (state.currentChapterIndex || 0);
              return (
                <div key={i} className={`glass rounded-xl p-5 transition-all ${isCurrent?'border-brand-500/40 glow':''} ${isCompleted?'opacity-80':''}`}>
                  <div className="flex items-start gap-4">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 font-bold text-sm ${isCompleted?'bg-green-500/20 text-green-300':isCurrent?'bg-brand-500/20 text-brand-300':'bg-surface-700 text-surface-200'}`}>
                      {isCompleted ? Icons.check : i + 1}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1">
                        <h3 className="font-semibold">{ch.title}</h3>
                        {isCurrent && <span className="px-2 py-0.5 bg-brand-500/20 text-brand-300 text-xs rounded-full">Current</span>}
                        {isCompleted && <span className="px-2 py-0.5 bg-green-500/20 text-green-300 text-xs rounded-full">Completed</span>}
                      </div>
                      <div className="flex flex-wrap gap-1.5 mb-2">
                        {ch.objectives.map((obj,j)=>(
                          <span key={j} className="text-xs px-2 py-0.5 bg-surface-700/50 rounded text-surface-200">{obj}</span>
                        ))}
                      </div>
                      <div className="text-xs text-surface-200">~{ch.estimatedTime} min</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {plan.agentMeta && <div className="mt-6"><AgentBadge agent={plan.agentMeta.agent} time={plan.agentMeta.processingTime}/></div>}
        </div>
      );
    }

    // ── Exercise Page ──
    function ExercisePage() {
      const { state, setState } = useApp();
      const [exercise, setExercise] = useState(null);
      const [answer, setAnswer] = useState('');
      const [loading, setLoading] = useState(false);
      const [showHint, setShowHint] = useState(false);

      const fetchExercise = useCallback(async () => {
        setLoading(true);
        try {
          const res = await api.getExercise(state.sessionId);
          if (res.error) throw new Error(res.error);
          setExercise(res.exercise);
          setAnswer('');
          setShowHint(false);
          setState(s => ({ ...s, currentExercise: res.exercise }));
        } catch (e) { alert('Error: ' + e.message); }
        setLoading(false);
      }, [state.sessionId]);

      useEffect(() => { fetchExercise(); }, []);

      const handleSubmit = async () => {
        if (!answer.trim() || answer.trim().length < 10) { alert('Please provide a more detailed answer (at least 10 characters).'); return; }
        setLoading(true);
        try {
          const res = await api.evaluate(state.sessionId, answer);
          if (res.error) throw new Error(res.error);
          setState(s => ({ ...s, lastEvaluation: res.evaluation, page: 'evaluation' }));
        } catch (e) { alert('Error: ' + e.message); }
        setLoading(false);
      };

      if (loading && !exercise) return <div className="max-w-3xl mx-auto"><Skeleton lines={8}/></div>;
      if (!exercise) return null;

      return (
        <div className="animate-fadeIn max-w-3xl mx-auto">
          <div className="flex items-center gap-3 mb-6">
            <div className="px-3 py-1 bg-brand-500/10 text-brand-300 rounded-lg text-sm font-medium">
              Chapter {exercise.chapter.index + 1}: {exercise.chapter.title}
            </div>
            <div className="px-3 py-1 bg-surface-700 text-surface-200 rounded-lg text-sm">
              Difficulty: {exercise.difficultyLabel}
            </div>
          </div>

          <div className="glass rounded-2xl p-6 md:p-8 glow mb-6">
            <div className="flex items-center gap-2 mb-4">
              {Icons.pencil}
              <h2 className="text-lg font-semibold">Exercise</h2>
              <span className="text-xs px-2 py-0.5 bg-purple-500/20 text-purple-300 rounded-full ml-auto">{exercise.exercise.type.replace('_',' ')}</span>
            </div>
            <div className="text-surface-200 text-sm mb-4 p-3 bg-surface-800/50 rounded-lg">{exercise.exercise.instructions}</div>
            <div className="text-white leading-relaxed mb-6 text-base">{exercise.exercise.question}</div>

            {exercise.context?.realWorldConnection && (
              <div className="p-3 bg-blue-500/5 border border-blue-500/10 rounded-lg mb-6">
                <div className="text-xs font-medium text-blue-300 mb-1">Real-world connection</div>
                <div className="text-sm text-surface-200">{exercise.context.realWorldConnection}</div>
              </div>
            )}

            <div className="mb-4">
              <label className="block text-sm font-medium text-surface-200 mb-2">Your Answer</label>
              <textarea value={answer} onChange={e=>setAnswer(e.target.value)} rows={8} placeholder="Write your detailed answer here..." className="w-full px-4 py-3 bg-surface-900 border border-surface-700 rounded-xl text-white placeholder-surface-200/50 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all resize-none"/>
              <div className="flex justify-between mt-2">
                <button onClick={()=>setShowHint(!showHint)} className="text-sm text-brand-300 hover:text-brand-200 transition-colors">
                  {showHint ? 'Hide hint' : 'Show hint'}
                </button>
                <span className="text-xs text-surface-200">{answer.length} characters</span>
              </div>
              {showHint && <div className="mt-2 p-3 bg-amber-500/5 border border-amber-500/10 rounded-lg text-sm text-amber-200">{exercise.exercise.hint}</div>}
            </div>

            <button onClick={handleSubmit} disabled={loading||answer.trim().length<10} className="w-full py-3.5 bg-brand-600 hover:bg-brand-500 disabled:opacity-40 disabled:cursor-not-allowed rounded-xl font-semibold transition-all flex items-center justify-center gap-2">
              {loading ? <><span className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"/>Evaluating...</> : 'Submit Answer'}
            </button>
          </div>

          {exercise.agentMeta && <AgentBadge agent={exercise.agentMeta.agent} time={exercise.agentMeta.processingTime}/>}
        </div>
      );
    }

    // ── Evaluation Page ──
    function EvaluationPage() {
      const { state, setState } = useApp();
      const [coachResult, setCoachResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const ev = state.lastEvaluation;
      if (!ev) { setState(s=>({...s,page:'dashboard'})); return null; }

      const getCoach = async () => {
        setLoading(true);
        try {
          const res = await api.coach(state.sessionId);
          if (res.error) throw new Error(res.error);
          setCoachResult(res.coaching);
          // Update session state
          const sessionRes = await api.getSession(state.sessionId);
          if (sessionRes.session) {
            setState(s => ({ ...s, completedChapters: sessionRes.session.completedChapters, currentChapterIndex: sessionRes.session.currentChapterIndex }));
          }
        } catch (e) { alert('Error: ' + e.message); }
        setLoading(false);
      };

      const decisionColors = { advance:'text-green-300 bg-green-500/10 border-green-500/20', repeat:'text-amber-300 bg-amber-500/10 border-amber-500/20', simplify:'text-blue-300 bg-blue-500/10 border-blue-500/20', increase_difficulty:'text-purple-300 bg-purple-500/10 border-purple-500/20', review_previous_chapter:'text-orange-300 bg-orange-500/10 border-orange-500/20' };
      const decisionLabels = { advance:'Advance to next chapter', repeat:'Practice current chapter', simplify:'Reduce difficulty', increase_difficulty:'Increase difficulty', review_previous_chapter:'Review previous chapter' };

      return (
        <div className="animate-fadeIn max-w-3xl mx-auto">
          <div className="glass rounded-2xl p-6 md:p-8 glow mb-6">
            <div className="flex items-center justify-between mb-6">
              <h2 className="text-xl font-bold">Evaluation Results</h2>
              <ScoreRing score={ev.score} label="/10"/>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
              <div className="p-4 bg-green-500/5 border border-green-500/10 rounded-xl">
                <h3 className="text-sm font-semibold text-green-300 mb-2">Strengths</h3>
                <ul className="space-y-1.5">{ev.strengths.map((s,i)=><li key={i} className="text-sm text-surface-200 flex items-start gap-2"><span className="text-green-400 mt-0.5">+</span>{s}</li>)}</ul>
              </div>
              <div className="p-4 bg-red-500/5 border border-red-500/10 rounded-xl">
                <h3 className="text-sm font-semibold text-red-300 mb-2">Areas to Improve</h3>
                <ul className="space-y-1.5">{ev.weaknesses.map((w,i)=><li key={i} className="text-sm text-surface-200 flex items-start gap-2"><span className="text-red-400 mt-0.5">-</span>{w}</li>)}</ul>
              </div>
            </div>

            <div className="p-4 bg-surface-800/50 rounded-xl mb-6">
              <h3 className="text-sm font-semibold mb-2">Feedback</h3>
              <p className="text-sm text-surface-200 leading-relaxed">{ev.feedback}</p>
            </div>

            {ev.misconceptions?.length > 0 && (
              <div className="p-4 bg-amber-500/5 border border-amber-500/10 rounded-xl mb-6">
                <h3 className="text-sm font-semibold text-amber-300 mb-2">Detected Misconceptions</h3>
                <ul className="space-y-1">{ev.misconceptions.map((m,i)=><li key={i} className="text-sm text-surface-200">{m}</li>)}</ul>
              </div>
            )}

            {ev.analysis && (
              <div className="flex items-center gap-4 p-3 bg-surface-800/30 rounded-lg mb-6 text-sm">
                <span className="text-surface-200">Performance: <span className="text-white font-medium">{ev.analysis.performanceLevel}</span></span>
                <span className="text-surface-700">|</span>
                <span className="text-surface-200">Trend: <span className="text-white font-medium">{ev.analysis.trend}</span></span>
                <span className="text-surface-700">|</span>
                <span className="text-surface-200">Average: <span className="text-white font-medium">{ev.analysis.runningAverage}/10</span></span>
              </div>
            )}

            {!coachResult && (
              <button onClick={getCoach} disabled={loading} className="w-full py-3.5 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 rounded-xl font-semibold transition-all flex items-center justify-center gap-2">
                {loading ? <><span className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"/>Coach is analyzing...</> : <>{Icons.brain} Get Coach Decision</>}
              </button>
            )}
          </div>

          {coachResult && (
            <div className="glass rounded-2xl p-6 glow mb-6 animate-fadeIn">
              <div className="flex items-center gap-2 mb-4">
                {Icons.brain}
                <h2 className="text-lg font-semibold">Coach Decision</h2>
              </div>
              <div className={`inline-flex items-center gap-2 px-4 py-2 rounded-xl border text-sm font-medium mb-4 ${decisionColors[coachResult.decision]||'bg-surface-700 text-white border-surface-600'}`}>
                {decisionLabels[coachResult.decision] || coachResult.decision}
              </div>
              <p className="text-sm text-surface-200 leading-relaxed mb-4">{coachResult.reason}</p>
              {coachResult.recommendations?.length > 0 && (
                <div className="mb-4">
                  <h3 className="text-sm font-semibold mb-2">Recommendations</h3>
                  <ul className="space-y-1.5">{coachResult.recommendations.map((r,i)=><li key={i} className="text-sm text-surface-200 flex items-start gap-2"><span className="text-brand-300 mt-0.5">{Icons.arrow}</span>{r}</li>)}</ul>
                </div>
              )}
              {coachResult.report?.expectedOutcome && (
                <div className="p-3 bg-brand-500/5 border border-brand-500/10 rounded-lg text-sm text-surface-200 mb-4">
                  <span className="font-medium text-brand-300">Expected outcome: </span>{coachResult.report.expectedOutcome}
                </div>
              )}
              <div className="flex gap-3">
                <button onClick={()=>setState(s=>({...s,page:'exercise'}))} className="flex-1 py-3 bg-brand-600 hover:bg-brand-500 rounded-xl font-semibold transition-all">Continue Learning</button>
                <button onClick={()=>setState(s=>({...s,page:'history'}))} className="px-5 py-3 bg-surface-700 hover:bg-surface-600 rounded-xl font-medium transition-all">View History</button>
              </div>
            </div>
          )}

          {ev.agentMeta && <AgentBadge agent={ev.agentMeta.agent} time={ev.agentMeta.processingTime}/>}
          {coachResult?.agentMeta && <div className="mt-2"><AgentBadge agent={coachResult.agentMeta.agent} time={coachResult.agentMeta.processingTime}/></div>}
        </div>
      );
    }

    // ── History Page ──
    function HistoryPage() {
      const { state } = useApp();
      const [history, setHistory] = useState(null);
      const [analytics, setAnalytics] = useState(null);

      useEffect(() => {
        if (!state.sessionId) return;
        Promise.all([api.getHistory(state.sessionId), api.getSession(state.sessionId)]).then(([h, s]) => {
          setHistory(h);
          setAnalytics(s.analytics);
        });
      }, [state.sessionId, state.page]);

      if (!history || !analytics) return <div className="max-w-3xl mx-auto"><Skeleton lines={6}/></div>;

      return (
        <div className="animate-fadeIn max-w-4xl mx-auto">
          <h1 className="text-2xl font-bold mb-6">Learning Analytics</h1>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            {[['Mastery',`${analytics.mastery}%`,'text-brand-300'],['Chapters',`${analytics.chaptersCompleted}/${analytics.totalChapters}`,'text-green-300'],['Avg Score',`${analytics.averageScore}/10`,'text-amber-300'],['Trend',analytics.trend==='improving'?'Improving':analytics.trend==='declining'?'Declining':'Stable',analytics.trend==='improving'?'text-green-300':'text-surface-200']].map(([label,val,cls])=>(
              <div key={label} className="glass rounded-xl p-4 text-center">
                <div className={`text-2xl font-bold ${cls}`}>{val}</div>
                <div className="text-xs text-surface-200 mt-1">{label}</div>
              </div>
            ))}
          </div>

          {history.scores.length > 0 && (
            <div className="glass rounded-xl p-5 mb-8">
              <h2 className="font-semibold mb-4">Score Progression</h2>
              <div className="flex items-end gap-2 h-32">
                {history.scores.map((s,i) => (
                  <div key={i} className="flex-1 flex flex-col items-center gap-1">
                    <span className="text-xs text-surface-200">{s}</span>
                    <div className="w-full rounded-t" style={{height:`${(s/10)*100}%`, backgroundColor: s>=7?'#22c55e':s>=4?'#eab308':'#ef4444', opacity:0.7+i/history.scores.length*0.3, minHeight:'4px'}}/>
                    <span className="text-[10px] text-surface-200">#{i+1}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {history.evaluations.length > 0 && (
            <div className="glass rounded-xl p-5 mb-8">
              <h2 className="font-semibold mb-4">Exercise History</h2>
              <div className="space-y-3">
                {history.evaluations.map((ev,i) => (
                  <div key={i} className="flex items-center gap-4 p-3 bg-surface-800/50 rounded-lg">
                    <ScoreRing score={ev.score} size={48}/>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium">Exercise #{i+1}</div>
                      <div className="text-xs text-surface-200 truncate">{ev.strengths?.[0] || 'Completed'}</div>
                    </div>
                    <div className="text-xs text-surface-200">{new Date(ev.createdAt).toLocaleDateString()}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {history.coachDecisions.length > 0 && (
            <div className="glass rounded-xl p-5">
              <h2 className="font-semibold mb-4">Coach Decisions</h2>
              <div className="space-y-3">
                {history.coachDecisions.map((cd,i) => (
                  <div key={i} className="p-3 bg-surface-800/50 rounded-lg">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="px-2 py-0.5 bg-emerald-500/20 text-emerald-300 text-xs rounded-full font-medium">{cd.decision.replace('_',' ')}</span>
                      <span className="text-xs text-surface-200">Difficulty: {cd.nextDifficulty}/7</span>
                    </div>
                    <p className="text-sm text-surface-200">{cd.reason}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          {history.scores.length === 0 && (
            <div className="glass rounded-xl p-12 text-center">
              <div className="text-surface-200 mb-2">No exercises completed yet</div>
              <button onClick={()=>window.dispatchEvent(new CustomEvent('navigate',{detail:'exercise'}))} className="text-brand-300 hover:text-brand-200 text-sm font-medium">Start your first exercise</button>
            </div>
          )}
        </div>
      );
    }

    // ── Sidebar ──
    function Sidebar({ mobileOpen, setMobileOpen }) {
      const { state, setState } = useApp();
      const navItems = [
        { id:'dashboard', label:'Dashboard', icon:Icons.home },
        { id:'program', label:'Program', icon:Icons.book, disabled:!state.plan },
        { id:'exercise', label:'Exercise', icon:Icons.pencil, disabled:!state.plan },
        { id:'history', label:'Analytics', icon:Icons.chart, disabled:!state.plan },
      ];

      const nav = (id) => { setState(s=>({...s,page:id})); setMobileOpen(false); };

      return (
        <>
          {mobileOpen && <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={()=>setMobileOpen(false)}/>}
          <aside className={`sidebar-mobile fixed md:static inset-y-0 left-0 z-50 w-64 bg-surface-900 border-r border-surface-700/50 flex flex-col ${mobileOpen?'mobile-menu-open':''}`}>
            <div className="p-5 border-b border-surface-700/50">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-gradient-to-br from-brand-500 to-brand-700 rounded-xl flex items-center justify-center">
                  <span className="text-white font-bold text-sm">E</span>
                </div>
                <div>
                  <h1 className="font-bold text-lg leading-tight">Epistudy</h1>
                  <p className="text-[10px] text-surface-200 uppercase tracking-wider">AI Learning Platform</p>
                </div>
                <button className="ml-auto md:hidden text-surface-200" onClick={()=>setMobileOpen(false)}>{Icons.close}</button>
              </div>
            </div>

            <nav className="flex-1 p-3 space-y-1">
              {navItems.map(item => (
                <button key={item.id} onClick={()=>!item.disabled&&nav(item.id)} disabled={item.disabled} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${state.page===item.id?'bg-brand-500/10 text-brand-300':'text-surface-200 hover:bg-surface-800 hover:text-white'} ${item.disabled?'opacity-30 cursor-not-allowed':''}`}>
                  {item.icon}{item.label}
                </button>
              ))}
            </nav>

            {state.plan && (
              <div className="p-4 border-t border-surface-700/50">
                <div className="text-xs text-surface-200 mb-1">Current Topic</div>
                <div className="text-sm font-medium truncate">{state.plan.topic}</div>
                <div className="mt-2 h-1.5 bg-surface-800 rounded-full overflow-hidden">
                  <div className="h-full bg-brand-500 rounded-full transition-all" style={{width:`${state.completedChapters?.length ? Math.round((state.completedChapters.length / state.plan.chapters.length) * 100) : 0}%`}}/>
                </div>
              </div>
            )}

            <div className="p-4 border-t border-surface-700/50">
              <div className="text-[10px] text-surface-200/50 text-center">Powered by 4 Autonomous AI Agents</div>
            </div>
          </aside>
        </>
      );
    }

    // ── Main App ──
    function App() {
      const [state, setState] = useState({
        page: 'dashboard',
        sessionId: null,
        plan: null,
        currentChapterIndex: 0,
        completedChapters: [],
        lastEvaluation: null,
        currentExercise: null,
      });
      const [mobileOpen, setMobileOpen] = useState(false);

      useEffect(() => {
        const handler = (e) => setState(s => ({ ...s, page: e.detail }));
        window.addEventListener('navigate', handler);
        return () => window.removeEventListener('navigate', handler);
      }, []);

      const renderPage = () => {
        switch (state.page) {
          case 'program': return <ProgramPage/>;
          case 'exercise': return <ExercisePage/>;
          case 'evaluation': return <EvaluationPage/>;
          case 'history': return <HistoryPage/>;
          default: return <DashboardPage/>;
        }
      };

      return (
        <AppContext.Provider value={{ state, setState }}>
          <div className="flex h-screen overflow-hidden">
            <Sidebar mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}/>
            <main className="flex-1 overflow-y-auto">
              <header className="sticky top-0 z-30 glass px-4 py-3 flex items-center gap-3 md:hidden">
                <button onClick={()=>setMobileOpen(true)} className="text-surface-200">{Icons.menu}</button>
                <span className="font-semibold">Epistudy</span>
              </header>
              <div className="p-4 md:p-8">
                {renderPage()}
              </div>
            </main>
          </div>
        </AppContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
